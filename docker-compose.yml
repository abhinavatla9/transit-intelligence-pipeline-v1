x-airflow-common: &airflow-common
  image: apache/airflow:2.8.0
  environment:
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://transit_user:transit_pass@postgres/airflow_db
    AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
    AIRFLOW__CORE__FERNET_KEY: 'qJSB3pRZVSjj4FfUl2_GnldGpj4sHj2k_y_HqL9eXf0='
  volumes:
      - ./orchestration/dags:/opt/airflow/dags
      - ./logs:/opt/airflow/logs
      - ./ingestion:/opt/airflow/ingestion
  depends_on:
      postgres:
        condition: service_healthy

services:

  airflow-init:
    <<: *airflow-common
    command: >
      bash -c "airflow db init && airflow users create --username admin --password admin --firstname Admin --lastname User --role Admin --email admin@example.com"
  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: miniopass
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
  spark:
    image: apache/spark:3.5.0
    command: /opt/spark/bin/spark-class org.apache.spark.deploy.master.Master
    environment: 
      SPARK_MODE: master
      SPARK_MASTER_WEBUI_PORT: 8082
    ports:
      - "7077:7077"
      - "8082:8082"
    volumes:
      - ./processing:/opt/spark/processing
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: transit_user
      POSTGRES_PASSWORD: transit_pass
      POSTGRES_DB: transit_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infrastructure/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "transit_user"]
      interval: 5s
      retries: 5
  airflow-webserver:
    <<: *airflow-common
    command: webserver
    ports:
      - "8080:8080"
  airflow-scheduler:
    <<: *airflow-common
    command: scheduler

volumes:
    postgres_data:
    minio_data: